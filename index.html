<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常任務抽選</title>
    <style>
        :root {
            --bg-color: #0B1120;
            --text-color: #A7F3D0;
            --card-bg: #1E293B;
            --border-color: #334155;
            --btn-bg: #059669;
            --btn-hover: #047857;
            --modal-bg: #0F172A;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .date-display {
            font-size: 1.2rem;
            font-weight: bold;
        }

        button {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background-color: var(--btn-hover); }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .task-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .task-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .task-card.draw-anim {
            animation: drawPop 0.5s ease forwards;
        }

        @keyframes drawPop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .task-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .task-text .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .task-text .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .edit-section { margin-bottom: 30px; }
        .edit-section h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        .edit-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--card-bg);
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        .edit-row input[type="text"] {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px;
            flex-grow: 1;
        }

        .edit-row input[type="number"] {
            width: 60px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px;
        }

        .delete-btn { background-color: #991B1B; padding: 5px 10px; }
        .delete-btn:hover { background-color: #7F1D1D; }

        /* Celebration */
        #celebration-msg {
            display: none;
            color: #FBBF24;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <div class="date-display" id="dateDisplay"></div>
        <button onclick="openModal()">編輯課題列表</button>
    </header>

    <main>
        <div id="celebration-msg">今日課題全部完成了，稱讚一下自己！記得抽出明天的課題唷。</div>
        <div class="task-container" id="currentTasksArea">
            </div>

        <div class="controls">
            <div class="toggle-group">
                <input type="radio" id="typeWeekday" name="dayType" value="weekday" checked>
                <label for="typeWeekday">平日</label>
                <input type="radio" id="typeWeekend" name="dayType" value="weekend">
                <label for="typeWeekend">假日</label>
            </div>
            <button onclick="drawTasks()">抽選明日課題</button>
        </div>
    </main>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>編輯課題列表</h2>
                <button onclick="closeModal()">關閉與儲存</button>
            </div>
            
            <div class="edit-section" id="weekdayEditArea">
                <h3>平日課題 <button onclick="addNewTask('weekday')" style="font-size:0.8rem; padding: 2px 5px;">新增</button></h3>
                <div class="list"></div>
            </div>

            <div class="edit-section" id="weekendEditArea">
                <h3>假日課題 <button onclick="addNewTask('weekend')" style="font-size:0.8rem; padding: 2px 5px;">新增</button></h3>
                <div class="list"></div>
            </div>
        </div>
    </div>

    <script>
        const initialTasks = {
            weekday: [
                { id: 'w1', title: '活動', subtitle: '走路運動上下班+爬樓梯上八樓至少兩次', active: true, prob: 20, locked: false },
                { id: 'w2', title: '飲控', subtitle: '低澱粉、禁糖飲', active: true, prob: 20, locked: false },
                { id: 'w3', title: '深蹲', subtitle: '可不連續做3組，一組10下', active: true, prob: 20, locked: false },
                { id: 'w4', title: '學習', subtitle: '背10個單字、3個文法', active: true, prob: 20, locked: false },
                { id: 'w5', title: '專注', subtitle: '通勤與睡前禁遊戲，12點前要入睡', active: true, prob: 20, locked: false }
            ],
            weekend: [
                { id: 'e1', title: '深蹲', subtitle: '可不連續做3組，一組10下', active: true, prob: 20, locked: false },
                { id: 'e2', title: '學習', subtitle: '背10個單字、3個文法', active: true, prob: 20, locked: false },
                { id: 'e3', title: '興趣', subtitle: '打兩小時IIDX or 製作新麵包 二選一', active: true, prob: 20, locked: false },
                { id: 'e4', title: '烹飪', subtitle: '三餐自炊並學習一道新菜色', active: true, prob: 20, locked: false },
                { id: 'e5', title: '紀錄', subtitle: '寫今日雜記，記錄自己的今日心境', active: true, prob: 20, locked: false }
            ]
        };

        let tasksData = JSON.parse(localStorage.getItem('tasksData')) || initialTasks;
        let todayTasks = JSON.parse(localStorage.getItem('todayTasks')) || [];

        function initDate() {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const format = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
            
            document.getElementById('dateDisplay').innerHTML = 
                `今天是 ${format(today)} &nbsp;&nbsp;|&nbsp;&nbsp; 明天是 ${format(tomorrow)} 週${days[tomorrow.getDay()]}`;
        }

        function renderTodayTasks() {
            const area = document.getElementById('currentTasksArea');
            area.innerHTML = '';
            
            if (todayTasks.length === 0) {
                area.innerHTML = '<p style="text-align:center; opacity:0.5;">目前無今日課題</p>';
                checkCompletion();
                return;
            }

            todayTasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <input type="checkbox" id="chk_${index}" ${task.completed ? 'checked' : ''} onchange="toggleTaskCompletion(${index})">
                    <div class="task-text">
                        <div class="title">${task.title}</div>
                        <div class="subtitle">${task.subtitle}</div>
                    </div>
                `;
                area.appendChild(card);
            });
            checkCompletion();
        }

        function toggleTaskCompletion(index) {
            todayTasks[index].completed = !todayTasks[index].completed;
            localStorage.setItem('todayTasks', JSON.stringify(todayTasks));
            checkCompletion();
        }

        function checkCompletion() {
            const msg = document.getElementById('celebration-msg');
            if (todayTasks.length > 0 && todayTasks.every(t => t.completed)) {
                msg.style.display = 'block';
            } else {
                msg.style.display = 'none';
            }
        }

        function drawTasks() {
            const type = document.querySelector('input[name="dayType"]:checked').value;
            const pool = tasksData[type].filter(t => t.active);
            
            if (pool.length < 2) {
                alert('啟用的課題數量不足，請至列表新增或啟用至少兩項。');
                return;
            }

            let drawn = [];
            let tempPool = JSON.parse(JSON.stringify(pool));

            for (let i = 0; i < 2; i++) {
                let sum = tempPool.reduce((acc, val) => acc + val.prob, 0);
                let rand = Math.random() * sum;
                for (let j = 0; j < tempPool.length; j++) {
                    if (rand < tempPool[j].prob) {
                        drawn.push({
                            title: tempPool[j].title,
                            subtitle: tempPool[j].subtitle,
                            completed: false
                        });
                        tempPool.splice(j, 1);
                        break;
                    }
                    rand -= tempPool[j].prob;
                }
            }

            todayTasks = drawn;
            localStorage.setItem('todayTasks', JSON.stringify(todayTasks));
            
            // Render with animation
            renderTodayTasks();
            const cards = document.querySelectorAll('#currentTasksArea .task-card');
            cards.forEach(c => {
                c.classList.remove('draw-anim');
                void c.offsetWidth; // trigger reflow
                c.classList.add('draw-anim');
            });
        }

        // --- Modal & Editing Logic ---
        function openModal() {
            renderEditList('weekday');
            renderEditList('weekend');
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            localStorage.setItem('tasksData', JSON.stringify(tasksData));
        }

        function renderEditList(type) {
            const container = document.querySelector(`#${type}EditArea .list`);
            container.innerHTML = '';
            
            tasksData[type].forEach(task => {
                const row = document.createElement('div');
                row.className = 'edit-row';
                row.innerHTML = `
                    <input type="checkbox" title="套用" ${task.active ? 'checked' : ''} onchange="updateTaskField('${type}', '${task.id}', 'active', this.checked)">
                    <input type="text" value="${task.title}" placeholder="主標題" onchange="updateTaskField('${type}', '${task.id}', 'title', this.value)" style="width:80px; flex-grow:0;">
                    <input type="text" value="${task.subtitle}" placeholder="副標題" onchange="updateTaskField('${type}', '${task.id}', 'subtitle', this.value)">
                    <input type="number" step="0.1" value="${task.prob.toFixed(1)}" onchange="updateProb('${type}', '${task.id}', this.value)" ${task.locked || !task.active ? 'disabled' : ''}>%
                    <label style="font-size:0.8rem;"><input type="checkbox" ${task.locked ? 'checked' : ''} onchange="updateTaskField('${type}', '${task.id}', 'locked', this.checked)" ${!task.active ? 'disabled' : ''}> 鎖定</label>
                    <button class="delete-btn" onclick="deleteTask('${type}', '${task.id}')">刪除</button>
                `;
                container.appendChild(row);
            });
        }

        function updateTaskField(type, id, field, value) {
            const task = tasksData[type].find(t => t.id === id);
            if (task) {
                task[field] = value;
                if(field === 'active' || field === 'locked') {
                    recalculateProbs(type);
                }
                renderEditList(type);
            }
        }

        function updateProb(type, id, newValue) {
            let val = parseFloat(newValue) || 0;
            if (val < 0) val = 0;
            if (val > 100) val = 100;

            const task = tasksData[type].find(t => t.id === id);
            if (task) {
                task.prob = val;
                task.locked = true; // 主動變更機率後自動鎖定，避免被後續運算刷掉
                recalculateProbs(type);
                renderEditList(type);
            }
        }

        function recalculateProbs(type) {
            let activeTasks = tasksData[type].filter(t => t.active);
            if(activeTasks.length === 0) return;

            let lockedTasks = activeTasks.filter(t => t.locked);
            let unlockedTasks = activeTasks.filter(t => !t.locked);
            
            let lockedSum = lockedTasks.reduce((sum, t) => sum + t.prob, 0);
            
            if (unlockedTasks.length > 0) {
                let remaining = Math.max(0, 100 - lockedSum);
                let avg = remaining / unlockedTasks.length;
                unlockedTasks.forEach(t => t.prob = avg);
            } else {
                // 如果全鎖定且總和不為100，依照當前比例強制正規化以達100%
                if (lockedSum > 0 && lockedSum !== 100) {
                    lockedTasks.forEach(t => t.prob = (t.prob / lockedSum) * 100);
                }
            }
        }

        function addNewTask(type) {
            const newId = type.charAt(0) + Date.now();
            tasksData[type].push({
                id: newId,
                title: '新任務',
                subtitle: '任務描述',
                active: true,
                prob: 0,
                locked: false
            });
            recalculateProbs(type);
            renderEditList(type);
        }

        function deleteTask(type, id) {
            tasksData[type] = tasksData[type].filter(t => t.id !== id);
            recalculateProbs(type);
            renderEditList(type);
        }

        // Init execution
        initDate();
        renderTodayTasks();
    </script>
</body>
</html>
