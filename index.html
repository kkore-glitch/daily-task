<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日常任務抽選</title>
    <style>
        :root {
            --bg-color: #0B1120;
            --text-color: #A7F3D0;
            --card-bg: #1E293B;
            --border-color: #334155;
            --btn-bg: #059669;
            --btn-hover: #047857;
            --modal-bg: #0F172A;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif;
            margin: 0;
            /* 適應 iOS 安全區域 */
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .date-display {
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
        }

        button {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
        }

        button:active { background-color: var(--btn-hover); }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .task-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .task-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .task-card.draw-anim {
            animation: drawPop 0.5s ease forwards;
        }

        @keyframes drawPop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 放大觸控點 */
        input[type="checkbox"], input[type="radio"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            accent-color: var(--btn-bg);
        }

        .task-text { flex-grow: 1; }
        .task-text .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .task-text .subtitle {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .controls {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .toggle-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background-color: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
        }

        .toggle-group label {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .controls button { padding: 16px; font-size: 1.2rem; }

        /* Modal Styles - 全螢幕適應手機 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg);
            z-index: 100;
            overflow-y: auto;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            box-sizing: border-box;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background-color: var(--modal-bg);
            padding: 10px 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 { margin: 0; font-size: 1.3rem; }
        .modal-header button { width: auto; padding: 8px 15px; font-size: 1rem; }

        .edit-section { margin-bottom: 30px; }
        .edit-section h3 { 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 8px; 
        }
        .edit-section h3 button { width: auto; padding: 6px 12px; font-size: 0.9rem; }

        /* 手機版編輯列表卡片化 */
        .edit-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: var(--card-bg);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .edit-row-top, .edit-row-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .edit-row-mid { width: 100%; }

        /* 防止 iOS 點擊輸入框時畫面縮放，font-size 需為 16px */
        input[type="text"], input[type="number"] {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-size: 16px; 
            border-radius: 5px;
            box-sizing: border-box;
        }

        .edit-row input[type="text"].title-input { flex-grow: 1; font-weight: bold; }
        .edit-row input[type="text"].subtitle-input { width: 100%; }
        .edit-row input[type="number"] { width: 80px; text-align: center; }

        .delete-btn { background-color: #991B1B; width: auto; padding: 10px 15px; }

        #celebration-msg {
            display: none;
            color: #FBBF24;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 15px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <div class="date-display" id="dateDisplay"></div>
        <button onclick="openModal()">編輯課題列表</button>
    </header>

    <main>
        <div id="celebration-msg">今日課題全部完成了，稱讚一下自己！<br>記得抽出明天的課題唷。</div>
        <div class="task-container" id="currentTasksArea"></div>

        <div class="controls">
            <div class="toggle-group">
                <label>
                    <input type="radio" name="dayType" value="weekday" checked> 平日
                </label>
                <label>
                    <input type="radio" name="dayType" value="weekend"> 假日
                </label>
            </div>
            <button onclick="drawTasks()">抽選明日課題</button>
        </div>
    </main>

    <div class="modal" id="editModal">
        <div class="modal-header">
            <h2>編輯列表</h2>
            <button onclick="closeModal()">儲存離開</button>
        </div>
        
        <div class="edit-section" id="weekdayEditArea">
            <h3>平日課題 <button onclick="addNewTask('weekday')">＋ 新增</button></h3>
            <div class="list"></div>
        </div>

        <div class="edit-section" id="weekendEditArea">
            <h3>假日課題 <button onclick="addNewTask('weekend')">＋ 新增</button></h3>
            <div class="list"></div>
        </div>
    </div>

    <script>
        const initialTasks = {
            weekday: [
                { id: 'w1', title: '活動', subtitle: '走路運動上下班+爬樓梯上八樓至少兩次', active: true, prob: 20, locked: false },
                { id: 'w2', title: '飲控', subtitle: '低澱粉、禁糖飲', active: true, prob: 20, locked: false },
                { id: 'w3', title: '深蹲', subtitle: '可不連續做3組，一組10下', active: true, prob: 20, locked: false },
                { id: 'w4', title: '學習', subtitle: '背10個單字、3個文法', active: true, prob: 20, locked: false },
                { id: 'w5', title: '專注', subtitle: '通勤與睡前禁遊戲，12點前要入睡', active: true, prob: 20, locked: false }
            ],
            weekend: [
                { id: 'e1', title: '深蹲', subtitle: '可不連續做3組，一組10下', active: true, prob: 20, locked: false },
                { id: 'e2', title: '學習', subtitle: '背10個單字、3個文法', active: true, prob: 20, locked: false },
                { id: 'e3', title: '興趣', subtitle: '打兩小時IIDX or 製作新麵包 二選一', active: true, prob: 20, locked: false },
                { id: 'e4', title: '烹飪', subtitle: '三餐自炊並學習一道新菜色', active: true, prob: 20, locked: false },
                { id: 'e5', title: '紀錄', subtitle: '寫今日雜記，記錄自己的今日心境', active: true, prob: 20, locked: false }
            ]
        };

        let tasksData = JSON.parse(localStorage.getItem('tasksData')) || initialTasks;
        let todayTasks = JSON.parse(localStorage.getItem('todayTasks')) || [];

        function initDate() {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const format = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
            
            document.getElementById('dateDisplay').innerHTML = 
                `今天是 ${format(today)}<br>明天是 ${format(tomorrow)} 週${days[tomorrow.getDay()]}`;
        }

        function renderTodayTasks() {
            const area = document.getElementById('currentTasksArea');
            area.innerHTML = '';
            
            if (todayTasks.length === 0) {
                area.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px;">目前無今日課題</p>';
                checkCompletion();
                return;
            }

            todayTasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <input type="checkbox" id="chk_${index}" ${task.completed ? 'checked' : ''} onchange="toggleTaskCompletion(${index})">
                    <div class="task-text">
                        <div class="title">${task.title}</div>
                        <div class="subtitle">${task.subtitle}</div>
                    </div>
                `;
                area.appendChild(card);
            });
            checkCompletion();
        }

        function toggleTaskCompletion(index) {
            todayTasks[index].completed = !todayTasks[index].completed;
            localStorage.setItem('todayTasks', JSON.stringify(todayTasks));
            checkCompletion();
        }

        function checkCompletion() {
            const msg = document.getElementById('celebration-msg');
            if (todayTasks.length > 0 && todayTasks.every(t => t.completed)) {
                msg.style.display = 'block';
            } else {
                msg.style.display = 'none';
            }
        }

        function drawTasks() {
            const type = document.querySelector('input[name="dayType"]:checked').value;
            const pool = tasksData[type].filter(t => t.active);
            
            if (pool.length < 2) {
                alert('啟用的課題數量不足，請至列表新增或啟用至少兩項。');
                return;
            }

            let drawn = [];
            let tempPool = JSON.parse(JSON.stringify(pool));

            for (let i = 0; i < 2; i++) {
                let sum = tempPool.reduce((acc, val) => acc + val.prob, 0);
                let rand = Math.random() * sum;
                for (let j = 0; j < tempPool.length; j++) {
                    if (rand < tempPool[j].prob) {
                        drawn.push({
                            title: tempPool[j].title,
                            subtitle: tempPool[j].subtitle,
                            completed: false
                        });
                        tempPool.splice(j, 1);
                        break;
                    }
                    rand -= tempPool[j].prob;
                }
            }

            todayTasks = drawn;
            localStorage.setItem('todayTasks', JSON.stringify(todayTasks));
            
            renderTodayTasks();
            const cards = document.querySelectorAll('#currentTasksArea .task-card');
            cards.forEach(c => {
                c.classList.remove('draw-anim');
                void c.offsetWidth; 
                c.classList.add('draw-anim');
            });
        }

        function openModal() {
            renderEditList('weekday');
            renderEditList('weekend');
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            localStorage.setItem('tasksData', JSON.stringify(tasksData));
        }

        function renderEditList(type) {
            const container = document.querySelector(`#${type}EditArea .list`);
            container.innerHTML = '';
            
            tasksData[type].forEach(task => {
                const row = document.createElement('div');
                row.className = 'edit-row';
                row.innerHTML = `
                    <div class="edit-row-top">
                        <input type="checkbox" title="啟用" ${task.active ? 'checked' : ''} onchange="updateTaskField('${type}', '${task.id}', 'active', this.checked)">
                        <input type="text" class="title-input" value="${task.title}" placeholder="主標題" onchange="updateTaskField('${type}', '${task.id}', 'title', this.value)">
                    </div>
                    <div class="edit-row-mid">
                        <input type="text" class="subtitle-input" value="${task.subtitle}" placeholder="副標題" onchange="updateTaskField('${type}', '${task.id}', 'subtitle', this.value)">
                    </div>
                    <div class="edit-row-bottom">
                        <div style="display:flex; align-items:center; gap:5px;">
                            <input type="number" step="0.1" value="${task.prob.toFixed(1)}" onchange="updateProb('${type}', '${task.id}', this.value)" ${task.locked || !task.active ? 'disabled' : ''}> %
                            <label style="font-size:0.9rem; display:flex; align-items:center;">
                                <input type="checkbox" style="width:18px; height:18px;" ${task.locked ? 'checked' : ''} onchange="updateTaskField('${type}', '${task.id}', 'locked', this.checked)" ${!task.active ? 'disabled' : ''}> 鎖定
                            </label>
                        </div>
                        <button class="delete-btn" onclick="deleteTask('${type}', '${task.id}')">刪除</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function updateTaskField(type, id, field, value) {
            const task = tasksData[type].find(t => t.id === id);
            if (task) {
                task[field] = value;
                if(field === 'active' || field === 'locked') recalculateProbs(type);
                renderEditList(type);
            }
        }

        function updateProb(type, id, newValue) {
            let val = parseFloat(newValue) || 0;
            if (val < 0) val = 0;
            if (val > 100) val = 100;

            const task = tasksData[type].find(t => t.id === id);
            if (task) {
                task.prob = val;
                task.locked = true; 
                recalculateProbs(type);
                renderEditList(type);
            }
        }

        function recalculateProbs(type) {
            let activeTasks = tasksData[type].filter(t => t.active);
            if(activeTasks.length === 0) return;

            let lockedTasks = activeTasks.filter(t => t.locked);
            let unlockedTasks = activeTasks.filter(t => !t.locked);
            let lockedSum = lockedTasks.reduce((sum, t) => sum + t.prob, 0);
            
            if (unlockedTasks.length > 0) {
                let remaining = Math.max(0, 100 - lockedSum);
                let avg = remaining / unlockedTasks.length;
                unlockedTasks.forEach(t => t.prob = avg);
            } else {
                if (lockedSum > 0 && lockedSum !== 100) {
                    lockedTasks.forEach(t => t.prob = (t.prob / lockedSum) * 100);
                }
            }
        }

        function addNewTask(type) {
            const newId = type.charAt(0) + Date.now();
            tasksData[type].push({
                id: newId, title: '', subtitle: '', active: true, prob: 0, locked: false
            });
            recalculateProbs(type);
            renderEditList(type);
        }

        function deleteTask(type, id) {
            if(confirm('確定要刪除此課題嗎？')) {
                tasksData[type] = tasksData[type].filter(t => t.id !== id);
                recalculateProbs(type);
                renderEditList(type);
            }
        }

        initDate();
        renderTodayTasks();
    </script>
</body>
</html>
